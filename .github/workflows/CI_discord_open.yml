name: PR Discord Notification

on:
  pull_request:
    branches: ["develop"]
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-discord-open-${{ github.ref }} 
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}
          AUTHOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # Mensaje para Discord
          CONTENT="🚀 **Notificación de ExamCraft**
          **Acción:** ${EVENT_NAME}
          **Título/Commit:** ${PR_TITLE}
          **Autor:** ${AUTHOR}
          **Enlace:** ${PR_URL}
          ---"

          # Enviar mensaje a Discord
          payload=$(jq -n --arg content "$CONTENT" '{content: $content}')
          resp=$(curl -sS -X POST "${DISCORD_WEBHOOK_URL}?wait=true" \
            -H "Content-Type: application/json" \
            -d "$payload")

          msg_id=$(echo "$resp" | jq -r '.id // empty')
          
          if [ -z "$msg_id" ] || [ "$msg_id" == "null" ]; then
            echo "Error: Discord no devolvió un ID de mensaje. Revisa el Webhook URL."
            exit 1
          fi
          
          echo "Mensaje enviado con éxito a Discord. ID: $msg_id"