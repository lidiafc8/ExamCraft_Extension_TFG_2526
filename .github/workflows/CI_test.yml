name: CI Plasmo Extension

on:
  pull_request: {}
  push:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exam-craft-extension

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalación Limpia para Linux
        # Borramos cualquier rastro previo y forzamos la descarga de binarios de Linux
        run: |
          rm -rf node_modules package-lock.json
          npm install --platform=linux --arch=x64
          # Instalamos los 3 motores críticos de Plasmo para Linux x64
          npm install --platform=linux --arch=x64 sharp @parcel/watcher lightningcss

      - name: Construir la extensión (Plasmo Build)
        # Si sigue fallando, añadimos una variable de entorno para forzar el modo producción
        run: NODE_ENV=production npm run build

      - name: Subir extensión como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build
          path: exam-craft-extension/build/