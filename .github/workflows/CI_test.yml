name: CI Plasmo Extension

on:
  pull_request: {}
  push:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exam-craft-extension

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias para Linux
        # Forzamos a npm a descargar las versiones de Linux aunque tú estés en Windows
        run: |
          npm install --platform=linux --arch=x64
          npm install --platform=linux --arch=x64 sharp @parcel/watcher lightningcss

      - name: Construir la extensión (Plasmo Build)
        run: npm run build

      - name: Subir extensión como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build
          path: exam-craft-extension/build/