name: CI Plasmo Extension

on:
  pull_request: {}
  push:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest  # Linux es suficiente y más rápido

    defaults:
      run:
        working-directory: exam-craft-extension

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                        # Caché automática de node_modules
          cache-dependency-path: exam-craft-extension/package-lock.json

      - name: Instalar dependencias
        run: npm ci                           # Más rápido y reproducible que npm install

      - name: Build (Plasmo)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Subir artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build
          path: exam-craft-extension/build/
          retention-days: 7                   # Evita acumular artefactos indefinidamente