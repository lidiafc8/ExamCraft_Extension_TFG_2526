name: CI Plasmo Extension

on:
  pull_request: {}
  push:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    # CAMBIAMOS LINUX POR WINDOWS AQUÍ:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: exam-craft-extension

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        # En Windows no necesitamos trucos raros, npm install normal funciona
        run: npm install

      - name: Construir la extensión (Plasmo Build)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Subir extensión como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build
          path: exam-craft-extension/build/