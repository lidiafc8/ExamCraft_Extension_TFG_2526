name: CI Plasmo Extension

on:
  pull_request: {}
  push:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exam-craft-extension

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y preparar dependencias para Linux
        # Este comando le dice a npm: "instala todo, pero asegúrate de traer las piezas de Linux x64"
        run: |
          npm install --platform=linux --arch=x64
          # Por si acaso algún paquete se resiste, forzamos los 3 rebeldes:
          npm install --platform=linux --arch=x64 sharp @parcel/watcher lightningcss

      # --- 3. FASE DE CONSTRUCCIÓN FINAL ---
      - name: Construir la extensión (Plasmo Build)
        if: success() 
        run: npm run build

      # --- 4. GUARDAR EL RESULTADO (ARTEFACTO) ---
      - name: Subir extensión como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build
          path: exam-craft-extension/build/